<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Travel Agent — Arize test target</title>
<style>
  :root {
    --bg: #0b0d10;
    --panel: #14171c;
    --panel-2: #1b1f26;
    --border: #2a2f38;
    --text: #e6e8eb;
    --muted: #8b93a1;
    --accent: #6aa1ff;
    --user: #2a3b58;
    --tool: #1f2a1f;
    --tool-border: #2d4530;
    --err: #5a2a2a;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: ui-sans-serif, -apple-system, system-ui, "Segoe UI", Inter, sans-serif;
    font-size: 14px;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 600;
  }
  header .sub { color: var(--muted); font-weight: 400; font-size: 12px; }
  header a { color: var(--accent); text-decoration: none; }
  main {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
  }
  .msg {
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--panel);
    line-height: 1.55;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .msg.user { background: var(--user); align-self: flex-end; max-width: 75%; }
  .msg.agent { background: var(--panel); }
  .msg.error { background: var(--err); }
  .msg.thinking { color: var(--muted); font-style: italic; }
  .tools { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
  details.tool {
    background: var(--tool);
    border: 1px solid var(--tool-border);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 12px;
  }
  details.tool summary { cursor: pointer; color: #b8e0b8; user-select: none; }
  details.tool pre {
    margin: 8px 0 0; padding: 8px;
    background: #0d130d; border-radius: 6px;
    overflow-x: auto; font-size: 11px; color: #d5e8d5;
  }
  .meta { color: var(--muted); font-size: 11px; margin-top: 6px; }
  form {
    display: flex;
    gap: 8px;
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    background: var(--panel);
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
  }
  textarea {
    flex: 1;
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font: inherit;
    resize: none;
    min-height: 44px;
    max-height: 200px;
  }
  textarea:focus { outline: 1px solid var(--accent); border-color: var(--accent); }
  button {
    background: var(--accent);
    color: #0b0d10;
    border: 0;
    border-radius: 8px;
    padding: 0 18px;
    font-weight: 600;
    font: inherit;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .controls {
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    padding: 8px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    font-size: 12px;
    color: var(--muted);
  }
  .controls label { display: flex; align-items: center; gap: 6px; }
  .controls select, .controls input {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 8px;
    font: inherit;
  }
  .empty {
    text-align: center;
    color: var(--muted);
    padding: 60px 20px;
  }
  .empty h2 { color: var(--text); margin: 0 0 8px; font-size: 18px; }
  .examples {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 16px;
  }
  .example {
    background: var(--panel); border: 1px solid var(--border); color: var(--text);
    padding: 6px 12px; border-radius: 16px; cursor: pointer; font-size: 12px;
  }
  .example:hover { border-color: var(--accent); }
</style>
</head>
<body>
<header>
  <span>fuad-testing-travel-agent</span>
  <span class="sub">·</span>
  <span class="sub">test endpoint for Arize agent-replay experiments</span>
  <span style="flex:1"></span>
  <a href="/docs" target="_blank">API docs</a>
</header>

<div class="controls">
  <label>Model
    <select id="model">
      <option value="claude-sonnet-4-5">claude-sonnet-4-5</option>
      <option value="claude-opus-4-7">claude-opus-4-7</option>
      <option value="claude-haiku-4-5">claude-haiku-4-5</option>
    </select>
  </label>
  <label>Max turns
    <input id="max_turns" type="number" min="1" max="30" value="12" style="width: 60px" />
  </label>
  <label>Bearer key
    <input id="bearer" type="password" placeholder="(optional)" style="width: 180px" />
  </label>
</div>

<main id="log">
  <div class="empty" id="empty">
    <h2>Plan a trip</h2>
    <div>Try one of these, or type your own:</div>
    <div class="examples">
      <button class="example">Plan a 3-day trip to Tokyo from SF in October</button>
      <button class="example">Weekend in NYC from Chicago</button>
      <button class="example">5-day honeymoon in Italy from Boston</button>
      <button class="example">Quick 2-day getaway to Mexico City from Austin</button>
    </div>
  </div>
</main>

<form id="form">
  <textarea id="input" placeholder="Where do you want to go?" autofocus></textarea>
  <button id="send" type="submit">Send</button>
</form>

<script>
const $ = (id) => document.getElementById(id);
const log = $("log");
const empty = $("empty");
const form = $("form");
const input = $("input");
const sendBtn = $("send");

document.querySelectorAll(".example").forEach(b => {
  b.addEventListener("click", () => { input.value = b.textContent; input.focus(); });
});

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
});

function append(node) {
  if (empty.parentNode) empty.remove();
  log.appendChild(node);
  log.scrollTop = log.scrollHeight;
}

function escape(s) {
  return String(s).replace(/[&<>"']/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]);
}

function renderToolCalls(calls) {
  if (!calls || calls.length === 0) return "";
  const html = calls.map((c, i) => `
    <details class="tool">
      <summary>${i+1}. ${escape(c.name)}</summary>
      <pre>input:  ${escape(JSON.stringify(c.input, null, 2))}
output: ${escape(JSON.stringify(c.output, null, 2))}</pre>
    </details>
  `).join("");
  return `<div class="tools">${html}</div>`;
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const goal = input.value.trim();
  if (!goal) return;

  const userMsg = document.createElement("div");
  userMsg.className = "msg user";
  userMsg.textContent = goal;
  append(userMsg);

  const thinking = document.createElement("div");
  thinking.className = "msg agent thinking";
  thinking.textContent = "Planning your trip…";
  append(thinking);

  input.value = "";
  sendBtn.disabled = true;

  const body = {
    goal,
    config: {
      model: $("model").value,
      max_turns: parseInt($("max_turns").value, 10) || 12,
    },
  };
  const headers = { "Content-Type": "application/json" };
  const bearer = $("bearer").value.trim();
  if (bearer) headers["Authorization"] = `Bearer ${bearer}`;

  try {
    const res = await fetch("/invoke", {
      method: "POST",
      headers,
      body: JSON.stringify(body),
    });
    const data = await res.json();
    thinking.remove();

    if (!res.ok) {
      const err = document.createElement("div");
      err.className = "msg error";
      err.textContent = `Error ${res.status}: ${JSON.stringify(data, null, 2)}`;
      append(err);
      return;
    }

    const agentMsg = document.createElement("div");
    agentMsg.className = "msg agent";
    agentMsg.innerHTML = escape(data.final_response || "(no response)")
      + renderToolCalls(data.tool_calls)
      + `<div class="meta">model: ${escape(data.model || "?")} · trace_id: ${escape((data.trace_id || "").slice(0, 16))}…</div>`;
    append(agentMsg);
  } catch (err) {
    thinking.remove();
    const e = document.createElement("div");
    e.className = "msg error";
    e.textContent = "Network error: " + err.message;
    append(e);
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
});
</script>
</body>
</html>
