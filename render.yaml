services:
  - type: web
    name: fuad-testing-travel-agent
    runtime: docker
    plan: starter
    region: oregon
    healthCheckPath: /healthz
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ARIZE_SPACE_ID
        sync: false
      - key: ARIZE_API_KEY
        sync: false
      - key: ARIZE_PROJECT_NAME
        value: fuad-testing-travel-agent
      - key: API_KEY
        sync: false
      - key: DEFAULT_MODEL
        value: claude-sonnet-4-5
